name: Build Release ZIP

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create correct directory structure
        run: |
          mkdir -p WP-Anticipate
          # Kopieer alle bestanden (behalve verborgen bestanden zoals .git) naar de nieuwe map
          shopt -s extglob
          cp -r !(WP-Anticipate) WP-Anticipate/
          ls -la WP-Anticipate/ # Debug: toon de inhoud van de map

      - name: Create ZIP
        run: |
          zip -r WP-Anticipate.zip WP-Anticipate/

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./WP-Anticipate.zip
          asset_name: WP-Anticipate.zip
          asset_content_type: application/zip
